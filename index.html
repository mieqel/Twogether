<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TwoGether 💘</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="app">

    <!-- Screen 1: Feed -->
    <section class="screen screen--active" id="screen-feed">
      <div class="feed" id="feed">
        <!-- cards go here in Phase 1 -->
      </div>
    </section>

    <!-- Screen 2: Potentials -->
    <section class="screen" id="screen-potentials">
      <h1>Potentials</h1>
    </section>

    <!-- Screen 3: Memories -->
    <section class="screen" id="screen-memories">
      <h1>Memories</h1>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-btn nav-btn--active" data-screen="feed">✨ Feed</button>
    <button class="nav-btn" data-screen="potentials">💌 Potentials</button>
    <button class="nav-btn" data-screen="memories">📸 Memories</button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
